name: ダイヤ改正チェック

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: jqを用意
        run: sudo apt-get install -y jq

      - name: ダイヤ改正チェック実行
        run: bash check-dia.sh

      - name: 結果をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add dia-alert.json
          git diff --cached --quiet || git commit -m "ダイヤ改正チェック $(date +%Y-%m-%d)"
          git push
